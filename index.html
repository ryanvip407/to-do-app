<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Pro — Desafio IA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       1. VARIÁVEIS E TEMAS (Light/Dark)
       ============================================= */
    :root[data-theme="dark"] {
      --bg:           #0f111a;
      --surface:      #1a1d29;
      --surface2:     #242938;
      --border:       #2d3446;
      --text:         #f0f0f8;
      --text-soft:    #a0a0c0;
      --text-muted:   #60608a;
      --accent:       #6366f1;
      --accent-glow:  rgba(99, 102, 241, 0.3);
    }

    :root[data-theme="light"] {
      --bg:           #f4f7ff;
      --surface:      #ffffff;
      --surface2:     #f0f2f9;
      --border:       #e0e4f0;
      --text:         #1e293b;
      --text-soft:    #475569;
      --text-muted:   #94a3b8;
      --accent:       #4f46e5;
      --accent-glow:  rgba(79, 70, 229, 0.15);
    }

    :root {
      --alta:         #ef4444;
      --alta-bg:      rgba(239, 68, 68, 0.15);
      --media:        #f59e0b;
      --media-bg:     rgba(245, 158, 11, 0.15);
      --baixa:        #10b981;
      --baixa-bg:     rgba(16, 185, 129, 0.15);
      --radius:       16px;
      --shadow:       0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    /* =============================================
       2. RESET E LAYOUT
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      transition: background-color 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    /* Top Bar: Data, Hora e Toggle */
    .top-bar {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-soft);
    }

    .clock-section { display: flex; gap: 15px; }

    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .theme-toggle:hover { background: var(--border); }

    /* =============================================
       3. HERO E STATUS
       ============================================= */
    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-card h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
    .stat-card p { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; }

    /* =============================================
       4. FORMULÁRIO
       ============================================= */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 680px;
      padding: 25px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 25px;
    }

    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: var(--text-muted); }
    
    .task-input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .task-input:focus { border-color: var(--accent); }

    .form-row { display: flex; gap: 12px; }
    .form-row select { flex: 1; padding: 12px; border-radius: 12px; background: var(--bg); color: var(--text); border: 2px solid var(--border); }
    
    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0 25px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.9; }

    /* =============================================
       5. LISTA E PAGINAÇÃO
       ============================================= */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .todo-list { width: 100%; max-width: 680px; min-height: 200px; }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
      transition: transform 0.2s;
    }

    .todo-item:hover { transform: scale(1.01); }
    .todo-item.concluida { opacity: 0.6; }
    .todo-item.concluida .task-text { text-decoration: line-through; }

    .item-info { flex: 1; }
    .task-text { display: block; font-weight: 500; margin-bottom: 4px; }
    .task-time { font-size: 0.7rem; color: var(--text-muted); }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
    .alta { color: var(--alta); background: var(--alta-bg); }
    .media { color: var(--media); background: var(--media-bg); }
    .baixa { color: var(--baixa); background: var(--baixa-bg); }

    .pagination {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
    }

    .page-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* =============================================
       6. RESPONSIVIDADE
       ============================================= */
    @media (max-width: 500px) {
      .form-row { flex-direction: column; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="clock-section">
      <span id="current-date">--/--/----</span>
      <span id="current-time">00:00:00</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
    </button>
  </div>

  <header class="hero">
    <h1>To-Do Pro</h1>
    <p>Sua produtividade em outro nível.</p>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>🔴 Alta</h3>
      <p id="stat-alta" style="color: var(--alta)">0</p>
    </div>
    <div class="stat-card">
      <h3>🟡 Média</h3>
      <p id="stat-media" style="color: var(--media)">0</p>
    </div>
    <div class="stat-card">
      <h3>🟢 Baixa</h3>
      <p id="stat-baixa" style="color: var(--baixa)">0</p>
    </div>
  </div>

  <section class="main-card">
    <div class="input-group">
      <label>O que precisa ser feito?</label>
      <input type="text" id="task-input" class="task-input" placeholder="Digite sua tarefa..." autocomplete="off">
    </div>
    <div class="form-row">
      <select id="priority-select">
        <option value="alta">Prioridade Alta</option>
        <option value="media" selected>Prioridade Média</option>
        <option value="baixa">Prioridade Baixa</option>
      </select>
      <button class="btn-add" onclick="addTask()">Adicionar</button>
    </div>
  </section>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('todas', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('concluidas', this)">Concluídas</button>
    <button class="filter-btn" onclick="setFilter('alta', this)">Alta</button>
    <button class="filter-btn" onclick="setFilter('media', this)">Média</button>
    <button class="filter-btn" onclick="setFilter('baixa', this)">Baixa</button>
  </div>

  <div id="todo-list" class="todo-list">
    </div>

  <div class="pagination">
    <button class="page-btn" id="prevPage" onclick="changePage(-1)">Anterior</button>
    <span id="page-info">Página 1 de 1</span>
    <button class="page-btn" id="nextPage" onclick="changePage(1)">Próxima</button>
  </div>

  <script>
    // ESTADO
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let currentFilter = 'todas';
    let currentPage = 1;
    const itemsPerPage = 5;

    // DATA E HORA
    function updateClock() {
      const now = new Date();
      document.getElementById('current-date').textContent = now.toLocaleDateString('pt-BR');
      document.getElementById('current-time').textContent = now.toLocaleTimeString('pt-BR');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // TEMA
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-text').textContent = isDark ? 'Modo Claro' : 'Modo Escuro';
    }

    // ADICIONAR TAREFA
    function addTask() {
      const input = document.getElementById('task-input');
      const priority = document.getElementById('priority-select').value;
      
      if (!input.value.trim()) return;

      const newTask = {
        id: Date.now(),
        text: input.value,
        priority: priority,
        completed: false,
        createdAt: new Date().toLocaleString('pt-BR')
      };

      tasks.unshift(newTask);
      saveAndRender();
      input.value = '';
    }

    // FILTROS E PAGINAÇÃO
    function setFilter(filter, btn) {
      currentFilter = filter;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function changePage(step) {
      currentPage += step;
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
      saveAndRender();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveAndRender();
    }

    function saveAndRender() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
      render();
    }

    function render() {
      const container = document.getElementById('todo-list');
      
      // Filtragem
      let filtered = tasks.filter(t => {
        if (currentFilter === 'todas') return true;
        if (currentFilter === 'concluidas') return t.completed;
        return t.priority === currentFilter;
      });

      // Paginação
      const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      
      const start = (currentPage - 1) * itemsPerPage;
      const paginated = filtered.slice(start, start + itemsPerPage);

      // UI
      container.innerHTML = paginated.length ? '' : '<p style="text-align:center; color:var(--text-muted)">Nenhuma tarefa encontrada.</p>';
      
      paginated.forEach(t => {
        container.innerHTML += `
          <div class="todo-item ${t.completed ? 'concluida' : ''}">
            <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${t.id})">
            <div class="item-info">
              <span class="task-text">${t.text}</span>
              <span class="task-time">Criada em: ${t.createdAt}</span>
            </div>
            <span class="badge ${t.priority}">${t.priority}</span>
            <button style="background:none; border:none; color:var(--alta); cursor:pointer; font-weight:bold" onclick="deleteTask(${t.id})">✕</button>
          </div>
        `;
      });

      // Contadores
      document.getElementById('stat-alta').textContent = tasks.filter(t => t.priority === 'alta' && !t.completed).length;
      document.getElementById('stat-media').textContent = tasks.filter(t => t.priority === 'media' && !t.completed).length;
      document.getElementById('stat-baixa').textContent = tasks.filter(t => t.priority === 'baixa' && !t.completed).length;

      // Info Paginação
      document.getElementById('page-info').textContent = `Página ${currentPage} de ${totalPages}`;
      document.getElementById('prevPage').disabled = currentPage === 1;
      document.getElementById('nextPage').disabled = currentPage === totalPages;
    }

    // Inicializar
    render();
  </script>
</body>
</html>
